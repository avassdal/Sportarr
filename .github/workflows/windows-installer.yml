name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version
        id: version
        run: |
          CURRENT_VERSION=$(grep 'AppVersion =' src/Version.cs | sed 's/.*"\(.*\)".*/\1/')
          BUILD_NUMBER=${{ github.run_number }}
          FULL_VERSION="$CURRENT_VERSION.$BUILD_NUMBER"
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $FULL_VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy Frontend to wwwroot
        run: |
          rm -rf src/wwwroot/assets src/wwwroot/index.html
          mkdir -p src/wwwroot/assets
          cp -r _output/UI/* src/wwwroot/

      - name: Build Windows x64
        run: |
          dotnet publish src/Sportarr.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:SkipFrontendBuild=true -p:Version=${{ steps.version.outputs.version }} -o publish/win-x64
          cd publish/win-x64 && zip -r ../../Sportarr-win-x64-${{ steps.version.outputs.version }}.zip .
          cd ../..

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-build
          path: publish/win-x64/
          retention-days: 1

  build-installer:
    needs: build-windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: win-x64-build
          path: publish/win-x64

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $versionFile = Get-Content src/Version.cs
          $version = [regex]::Match($versionFile, 'AppVersion = "([^"]+)"').Groups[1].Value
          $buildNumber = "${{ github.run_number }}"
          $fullVersion = "$version.$buildNumber"
          echo "version=$fullVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Building installer for version: $fullVersion"

      - name: Create ICO file from PNG
        shell: pwsh
        run: |
          choco install imagemagick -y --no-progress
          $env:Path = "C:\Program Files\ImageMagick-7.1.1-Q16-HDRI;$env:Path"
          magick Logo/256.png Logo/128.png Logo/64.png Logo/48.png Logo/32.png Logo/16.png Logo/sportarr.ico
          Write-Host "Created sportarr.ico"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Inno Setup installed"

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Write-Host "Building installer for version: $version"
          New-Item -ItemType Directory -Force -Path installer-output
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer/sportarr.iss
          Write-Host "Installer built successfully"
          Get-ChildItem installer-output/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer-output/*.exe
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Windows Installer ${{ steps.version.outputs.version }}
          draft: true
          prerelease: true
          files: |
            installer-output/Sportarr-Setup-${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
